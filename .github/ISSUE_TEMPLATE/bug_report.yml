name: Bug 报告
description: 报告应用中的问题或错误
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## 感谢您报告问题！
        
        请提供尽可能详细的信息，这将帮助我们快速定位和解决问题。
        
        ---

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 请清晰简洁地描述遇到的问题
      placeholder: 例如：在查看插画详情时应用闪退
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 触发步骤
      description: 请详细描述重现问题的具体步骤
      placeholder: |
        1. 打开应用
        2. 进入推荐页面
        3. 点击任意插画
        4. 滑动到评论区域
        5. 应用闪退
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 您期望的正常行为是什么？
      placeholder: 应用应该正常显示评论内容而不闪退
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么？
      placeholder: 应用在显示评论时立即闪退
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: 设备类型
      description: 请选择您使用的设备类型
      options:
        - iPhone
        - iPad
        - Mac
    validations:
      required: true

  - type: input
    id: device_model
    attributes:
      label: 设备型号
      description: 您的设备具体型号（如 iPhone 17 Pro, MacBook Pro 16英寸）
      placeholder: iPhone 17 Pro
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: 系统版本
      description: 您的设备系统版本（如 iOS 26.1, macOS 26.0）
      placeholder: iOS 26.1
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: App 版本
      description: 您使用的 Pixiv-SwiftUI 版本号
      placeholder: 1.0.0
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 截图或录屏
      description: 如果可能，请提供相关的截图或录屏文件链接
      placeholder: 拖拽图片文件到这里或提供图片链接

  - type: textarea
    id: logs
    attributes:
      label: 日志信息
      description: 如果有崩溃日志或错误信息，请在此粘贴
      placeholder: 粘贴崩溃日志或错误堆栈信息

  - type: checkboxes
    id: terms
    attributes:
      label: 确认事项
      options:
        - label: 我已确认这不是重复的问题
          required: true
        - label: 我已阅读并同意项目的使用条款
          required: true