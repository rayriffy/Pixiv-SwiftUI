name: 功能请求
description: 建议新功能或改进现有功能
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## 欢迎提出功能建议！
        
        请详细描述您希望添加的功能，这有助于我们更好地理解和实现您的需求。
        
        ---

  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 请清晰描述您希望添加的功能
      placeholder: 例如：希望添加夜间模式自动切换功能
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: 主要使用设备
      description: 这个功能主要在哪种设备上使用？
      options:
        - iPhone
        - iPad
        - Mac
        - 所有设备
    validations:
      required: true

  - type: textarea
    id: mockups
    attributes:
      label: 界面设计建议
      description: 如果有界面设计想法或草图，请在此描述
      placeholder: |
        建议在设置页面添加"自动主题"开关
        或者在显示设置中添加时间范围配置

  - type: textarea
    id: related_features
    attributes:
      label: 相关功能
      description: 这个功能与现有哪些功能相关？
      placeholder: |
        与现有的深色模式设置相关
        与主题自定义功能有联系

  - type: checkboxes
    id: terms
    attributes:
      label: 确认事项
      options:
        - label: 我已确认这不是重复的功能请求
          required: true
        - label: 我理解 issue 的解决可能需要时间
          required: false